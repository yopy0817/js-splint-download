<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습 11: DOM 탐색</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 10px; }
        .family-tree { border: 1px solid #ccc; padding: 15px; margin: 10px; }
        .parent { 
            background-color: #e3f2fd; 
            padding: 10px; 
            margin: 5px; 
            border: 2px solid #2196f3; 
        }
        .child { 
            background-color: #f3e5f5; 
            padding: 8px; 
            margin: 3px; 
            border: 1px solid #9c27b0; 
        }
        .sibling { 
            background-color: #e8f5e8; 
            padding: 8px; 
            margin: 3px; 
            border: 1px solid #4caf50; 
        }
        .highlight { background-color: yellow !important; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; min-height: 50px; }
    </style>
</head>
<body>
    <h1>실습 11: DOM 탐색</h1>
    <p>버튼을 클릭하여 target 요소의 관계를 탐색해보세요.</p>
    
    <button id="findParentBtn">부모 찾기</button>
    <button id="findNextBtn">다음 형제 찾기</button>
    <button id="findPrevBtn">이전 형제 찾기</button>
    
    <div class="family-tree">
        <div class="parent" id="parent">
            부모 요소
            <div class="child" id="child1">첫 번째 자식</div>
            <div class="child" id="target">타겟 요소</div>
            <div class="child" id="child2">두 번째 자식</div>
        </div>
    </div>
    
    <div id="result">탐색 결과가 여기에 표시됩니다</div>

    <script>
        // TODO: 각 버튼 클릭 시 target 요소의 관계를 탐색하여 결과를 표시하세요
        // findParentBtn: target의 부모 요소를 찾아서 텍스트를 result에 표시
        // findNextBtn: target의 다음 형제 요소를 찾아서 텍스트를 result에 표시
        // findPrevBtn: target의 이전 형제 요소를 찾아서 텍스트를 result에 표시
        // 힌트: parentNode, nextElementSibling, previousElementSibling 사용
        
        let findParentBtn = document.getElementById("findParentBtn");
        let findNextBtn = document.getElementById("findNextBtn");
        let findPrevBtn = document.getElementById("findPrevBtn");
        let parent = document.querySelector(".parent");
        let target = document.getElementById("target");

        function clearHighlight() {
            let clearHighlight = document.querySelectorAll(".parent, .child");
            clearHighlight.forEach( function (item) {
                item.classList.remove("highlight")
            });
        }

        findParentBtn.addEventListener("click", function() {
            clearHighlight();
            parent.classList.add("highlight");
            result.textContent = "부모요소를 찾았습니다: " + parent.textContent.trim()
        });

        findNextBtn.addEventListener("click", function() {
            clearHighlight();
            let nextSibling = target.nextElementSibling;
            if(nextSibling) {
                nextSibling.classList.add("highlight")
                result.textContent = "다음 형제를 찾았습니다: " + nextSibling.textContent.trim();
            } else {
                result.textContent = "다음 형제가 없습니다.";
            }
        });

        findPrevBtn.addEventListener("click", function() {
            clearHighlight();
            let prevSibling = target.previousElementSibling;
            if(prevSibling) {
                prevSibling.classList.add("highlight");
                result.textContent = "이전 형제를 찾았습니다" + prevSibling.textContent.trim();
            } else {
                result.textContent = "이전 형제가 없습니다.";
            }
        });

    </script>
</body>
</html>
