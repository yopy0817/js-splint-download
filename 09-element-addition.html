<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습 9: 요소 추가</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 10px; }
        .list { border: 1px solid #ccc; padding: 10px; margin: 10px; }
        .item { 
            background-color: #f0f0f0; 
            padding: 8px; 
            margin: 5px; 
            border-radius: 4px; 
        }
        .new-item { 
            background-color: #e8f5e8; 
            border-left: 3px solid green; 
        }
    </style>
</head>
<body>
    <h1>실습 9: 요소 추가</h1>
    <p>버튼을 클릭하여 요소를 다양한 위치에 추가해보세요.</p>
    
    <button id="appendBtn">맨 뒤에 추가</button>
    <button id="prependBtn">맨 앞에 추가</button>
    <button id="insertBtn">중간에 추가</button>
    
    <div id="list" class="list">
        <div class="item">기존 아이템 1</div>
        <div class="item">기존 아이템 2</div>
    </div>

    <script>
        // TODO: 각 버튼 클릭 시 새로운 요소를 다른 위치에 추가하세요
        // appendBtn: 리스트 맨 뒤에 "새 아이템 (뒤)" 추가
        // prependBtn: 리스트 맨 앞에 "새 아이템 (앞)" 추가  
        // insertBtn: 첫 번째 아이템 뒤에 "새 아이템 (중간)" 추가. 
        // 힌트: appendChild(), insertBefore() 사용
        let appendBtn = document.getElementById("appendBtn");
        let prependBtn = document.getElementById("prependBtn");
        let insertBtn = document.getElementById("insertBtn");
        let list = document.getElementById("list");

        appendBtn.onclick = function(){
            let div = document.createElement("div");
            div.classList.add("item", "new-item");
            div.innerHTML = "새 아이템 (뒤)";
            list.appendChild(div);
        }

        prependBtn.onclick = function(){
            let div = document.createElement("div");
            div.classList.add("item", "new-item");
            div.innerHTML = "새 아이템 (앞)";
            list.insertBefore(div, list.firstElementChild);
        }

        insertBtn.onclick = function(){
            let div = document.createElement("div");
            let second = list.children[1];
            div.classList.add("item", "new-item");
            div.innerHTML = "새 아이템 (중간)";
            if(second){
                list.appendChild(div);
                list.insertBefore(div, second);
            }else{
                list.appendChild(div);
            }
        }
    </script>
</body>
</html>
