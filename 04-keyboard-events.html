<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM 스프린트 03 - 키보드 이벤트</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        input { padding: 10px; font-size: 16px; margin: 10px; width: 200px; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; min-height: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DOM 스프린트 03 - 키보드 이벤트</h1>
        <p>입력창에 텍스트를 입력하고 키를 눌러보세요.</p>
        
        <input type="text" id="keyInput" placeholder="여기에 텍스트를 입력하세요">
        <div id="result">키보드 이벤트 결과가 여기에 표시됩니다</div>
    </div>

    <script>
        /* 
        desc : jkk
        date : 20250903
        체감난이도:★☆☆☆☆ 
        key press가 뭔가 좀 이상한데? - space / enter만 적용되는듯? 향후 쓸일없을거같으니 패스
        */

        // 힌트: 
        // 1. keydown - 키를 누를 때
        // 2. keyup - 키를 놓을 때
        // 3. keypress - 문자 키를 누를 때
        // 4. event.key로 눌린 키를 확인하세요
        
        // 딱히 의미는 없는데 구분하러 변수 3개 생성
        //let ke=document.getElementById("keyInput");
        let kd=document.getElementById("keyInput");
        let ku=document.getElementById("keyInput");
        let kp=document.getElementById("keyInput");
        let r=document.getElementById("result");

        /* ke.addEventListener("keydown",function(){
            r.textContent="키 다운:"+event.key;
        }); */
        kd.addEventListener("keydown",function(){
            r.textContent="키 다운:"+event.key;
        });
        ku.addEventListener("keyup",function(){
            r.textContent="키 업:"+event.key;
        });
        kp.addEventListener("keypress",function(){
            r.textContent="키 누르기:"+event.key;
        });
        
        // 여기에 코드를 작성하세요
        
    </script>
</body>
</html>
